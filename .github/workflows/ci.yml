name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    container: mcr.microsoft.com/devcontainers/typescript-node:24
    steps:
      - uses: actions/checkout@v6

      - run: npm install -g npm@11

      - run: npm ci

      - run: npm run lint

      - run: npm run build
